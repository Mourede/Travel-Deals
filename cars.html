<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cars - Travel Deals</title>
  <link rel="stylesheet" href="mystyle.css">
</head>
<body>

  <div class="header">
    <h1>Travel Deals</h1>
    <div class="tagline">Car rental deals for your trip</div>
    <div id="datetime"></div>
  </div>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="book.html">Flights</a>
    <a href="stays.html">Stays</a>
    <a href="cars.html">Cars</a>
    <a href="cruise.html">Cruises</a>
    <a href="contact.html">Contact Us</a>
  </div>

  <div class="container">

    <div class="side">
      <h3>Display</h3>
      <p class="side-note">Adjust the page display.</p>

      <div class="controls">
        <label>Text Size
          <input type="number" id="fontSize" value="16" min="10" max="30" onchange="changeFont()">
        </label>

        <label>Background
          <input type="color" id="bgColor" value="#faf6ef" onchange="changeBg()">
        </label>
      </div>
    </div>

    <div class="main" id="mainContent">
      <span class="eyebrow">Cars</span>
      <h2>Rent a Car</h2>
      <p class="intro">Pick a city, car type, and travel dates.</p>

      <label>City</label>
      <input type="text" id="city" placeholder="Example: Austin">

      <label>Car Type</label>
      <select id="carType">
        <option value="economy">Economy</option>
        <option value="suv">SUV</option>
        <option value="compact">Compact</option>
        <option value="midsize">Midsize</option>
      </select>

      <label>Check-in Date</label>
      <input type="date" id="checkIn">

      <label>Check-out Date</label>
      <input type="date" id="checkOut">

      <button type="button" onclick="searchCar()">Submit</button>

      <div id="message"></div>
    </div>

  </div>

  <div class="footer">
    <p>Travel Deals</p>
  </div>

  <script src="script.js"></script>
  <script src="cars.js"></script>
</body>
</html>
