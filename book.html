<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Flight - Travel Deals</title>
  <link rel="stylesheet" href="mystyle.css">
</head>
<body>

  <div class="header flight-header">
    <h1>Travel Deals</h1>
    <div class="tagline">Book your flight deal</div>
    <div id="datetime"></div>
  </div>

  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="book.html">Flights</a>
    <a href="stays.html">Stays</a>
    <a href="cars.html">Cars</a>
    <a href="cruise.html">Cruises</a>
    <a href="contact.html">Contact Us</a>
  </div>

  <div class="container">

    <div class="side">
      <h3>Display</h3>
      <p>Change the page display.</p>

      <label>Text Size</label>
      <input type="number" id="fontSize" value="16" min="10" max="30" onchange="changeFont()">

      <label>Background</label>
      <input type="color" id="bgColor" value="#faf6ef" onchange="changeBg()">
    </div>

    <div class="main" id="mainContent">
      <span class="eyebrow">Flights</span>
      <h2>Search Flights</h2>
      <p class="intro">Search for a one-way or round trip flight between Texas and California cities.</p>

      <label>Trip Type</label>
      <select id="tripType" onchange="changeTrip()">
        <option value="oneway">One Way</option>
        <option value="round">Round Trip</option>
      </select>

      <label>Origin</label>
      <input type="text" id="origin" placeholder="Example: Dallas">

      <label>Destination</label>
      <input type="text" id="destination" placeholder="Example: Los Angeles">

      <label>Departure Date</label>
      <input type="date" id="departDate">

      <div id="returnDiv" style="display:none;">
        <label>Return Date</label>
        <input type="date" id="returnDate">
      </div>

      <button type="button" class="btn-ghost" onclick="togglePassengers()">
        &#128100; Passengers
      </button>

      <div id="passengerBox" style="display:none;">
        <label>Adults</label>
        <input type="number" id="adults" value="1" min="0" max="4">

        <label>Children</label>
        <input type="number" id="children" value="0" min="0" max="4">

        <label>Infants</label>
        <input type="number" id="infants" value="0" min="0" max="4">
      </div>

      <button type="button" onclick="searchFlight()">Search Flights</button>

      <div id="message"></div>
    </div>

  </div>

  <div class="footer">
    <p>Travel Deals</p>
  </div>

  <script src="script.js"></script>
  <script src="book.js"></script>
</body>
</html>
